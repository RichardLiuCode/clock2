<!DOCTYPE html>
<html>

<head>
    <script defer src="./assets/script.js"></script>
    <link rel="stylesheet" href="./assets/style.css">
</head>

<body>
    <div class="leftBar">
        <div class="leftBatTopFiller"></div>
        <button class="optionBtn" id="clockBtn">
            <img src="./assets/Images/time.png">
            <p>Clock</p>
        </button>
        <button class="optionBtn" id="timerBtn">
            <img src="./assets/Images/sand-clock.png">
            <p>Timer</p>
        </button>
        <button class="optionBtn" id="stopwatchBtn">
            <img src="./assets/Images/stopwatch.png">
            <p>Stopwatch</p>
        </button>
    </div>
    <div class="mainWrapper">
        <div id="ClockScreen" class="screen">
            <div class="clockScreenWrapper">
                <div class="clockBackground">
                    <div id="clockTime"></div>
                    <div id="amorpm">AM</div>
                </div>
            </div>
        </div>
        <div id="TimerScreen" class="screen"></div>
        <div id="StopwatchScreen" class="screen"></div>
    </div>
</body>

</html>
